repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --check
        language: system
        stages: [pre-commit]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        stages: [pre-commit]
        pass_filenames: false

      - id: cargo-check
        name: cargo check
        entry: cargo check
        language: system
        stages: [pre-commit]
        pass_filenames: false

      - id: cargo-nextest
        name: cargo nextest
        entry: cargo nextest run --hide-progress-bar --failure-output final
        language: system
        stages: [pre-commit]
        pass_filenames: false
