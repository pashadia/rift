syntax = "proto3";
package rift;

import "common.proto";

// READ (0x30 / 0x31)
message ReadRequest {
  bytes  handle      = 1;
  uint32 start_chunk = 2;
  uint32 chunk_count = 3;
}
message ReadResponse {
  oneof result {
    ReadSuccess ok    = 1;
    ErrorDetail error = 2;
  }
}
message ReadSuccess {
  uint32 chunk_count = 1;
}

// BLOCK_HEADER (0x32)
message BlockHeader {
  ChunkInfo chunk = 1;
}

// TRANSFER_COMPLETE (0x33)
message TransferComplete {
  bytes merkle_root = 1;
}

// WRITE (0x34 / 0x35 / 0x36)
message WriteRequest {
  oneof target {
    bytes   existing_handle = 1;
    NewFile new_file        = 2;
  }
  bytes              expected_root = 3;
  repeated ChunkInfo chunks        = 4;
}
message NewFile {
  bytes  parent_handle = 1;
  string name          = 2;
  uint32 mode          = 3;
}
message WriteCommit {}
message WriteResponse {
  oneof result {
    WriteSuccess ok    = 1;
    ErrorDetail  error = 2;
  }
}
message WriteSuccess {
  bytes new_root = 1;
  bytes handle   = 2;
}

// MERKLE_DRILL (0x50) — hash-based tree traversal
message MerkleDrill {
  bytes handle = 1;
  bytes hash    = 2;  // empty = request root's children
}

// MERKLE_DRILL_RESPONSE (0x51)
message MerkleDrillResponse {
  bytes parent_hash              = 1;
  repeated MerkleChildProto children = 2;
}

// Merkle child types for drill response
enum MerkleChildType {
  MERKLE_CHILD_SUBTREE = 0;
  MERKLE_CHILD_LEAF    = 1;
}

message MerkleChildProto {
  MerkleChildType child_type  = 1;
  bytes           hash        = 2;
  uint64          length      = 3;  // 0 for Subtree
  uint32          chunk_index = 4;  // 0 for Subtree
}

// MERKLE_LEAVES_RESPONSE (0x52) — kept for block-level detail queries
message MerkleLeavesResponse {
  repeated SubtreeLeaves subtrees = 1;
}
message SubtreeLeaves {
  uint32             subtree_index = 1;
  repeated ChunkInfo chunks        = 2;
}
